version: "3.8"

services:
  crypto-service:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: cryptocurrency-app
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    environment:
      - VERSION=${VERSION:-1.0.0}
      - PORT=${PORT:-8000}
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - crypto-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  crypto-network:
    driver: bridge